appId: com.litessh.app
productName: liteSSH
directories:
  buildResources: build
files:
  - dist/**/*
  - dist-electron/**/*
  - "!node_modules"
win:
  target:
    - nsis
  icon: build/icon.ico
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  installerIcon: build/icon.ico
  uninstallerIcon: build/icon.ico
