appId: com.litessh.app
productName: liteSSH
directories:
  buildResources: build
  output: release
files:
  - dist/**/*
  - dist-electron/**/*
  - "!node_modules/**/*"
  - node_modules/ssh2/**/*
  - node_modules/asn1/**/*
  - node_modules/bcrypt-pbkdf/**/*
  - node_modules/nan/**/*
  - node_modules/safer-buffer/**/*
  - node_modules/tweetnacl/**/*
asarUnpack:
  - node_modules/ssh2/**/*
publish:
  provider: github
  owner: wat4me
  repo: liteSSH
win:
  target:
    - target: nsis
      arch:
        - x64
  icon: build/liteSSH.ico
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: liteSSH
  uninstallDisplayName: liteSSH
